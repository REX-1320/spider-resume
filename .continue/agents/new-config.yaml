# Agent model configuration for Spider Resume application
# This configuration defines the AI models used in the application

name: Spider Resume Agent Config
version: 1.0.0
schema: v1

# Define which models can be used
# https://docs.continue.dev/customization/models
models:
  # Primary text generation model via Groq
  - name: llama-3.3-70b-versatile
    provider: groq
    model: llama-3.3-70b-versatile
    apiKey: ${{ env.VITE_GROQ_KEY }}
    maxTokens: 2048

  # Vision model via Groq for image analysis
  - name: llama-4-scout-17b-16e
    provider: groq
    model: meta-llama/llama-4-scout-17b-16e-instruct
    apiKey: ${{ env.VITE_GROQ_KEY }}
    maxTokens: 1500

  # Fallback text generation model via Google Gemini
  - name: gemini-2.0-flash
    provider: google
    model: gemini-2.0-flash
    apiKey: ${{ env.VITE_GEMINI_KEY }}
    maxTokens: 2048

# MCP Servers that Continue can access
# https://docs.continue.dev/customization/mcp-tools
mcpServers:
  - uses: anthropic/memory-mcp
